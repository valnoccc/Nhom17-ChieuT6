<!DOCTYPE html>
<html>

<head>
    <title>Khách hàng</title>
</head>

<body>
    <h1>Danh sách Sinh viên (View dành cho User)</h1>
    <ul id="list"></ul>

    <script>
        const API_URL = "https://nhom17-chieut6.onrender.com/api/sinhvien";
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const html = data.map(sv => `<li>${sv.name} - ${sv.mssv}</li>`).join('');
                document.getElementById('list').innerHTML = html;
            });
    </script>
</body>

</html>
